<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Board Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,500&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-layer bg-layer-a"></div>
    <div class="bg-layer bg-layer-b"></div>

    <main class="container">
      <h1>Mood Board</h1>

      <blockquote id="quote-text">Click "New Mood" to get started.</blockquote>
      <p id="quote-author"></p>

      <div class="buttons">
        <button id="new-mood-btn">New Mood</button>
        <button id="save-btn">Save This One</button>
      </div>

      <h2>Saved Moods</h2>
      <ul id="saved-list"></ul>
    </main>

    <footer class="site-footer">
      <a href="https://github.com/SimeonATarr231" target="_blank" rel="noopener" class="footer-credit">
        Built by Simeon A. Tarr
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
